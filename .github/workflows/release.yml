name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  canary:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Set canary version
        run: |
          SHORT_HASH=$(git rev-parse --short HEAD)
          VERSION=$(node -p "require('./packages/faapi/package.json').version")
          CANARY_VERSION="${VERSION}-canary.${SHORT_HASH}"
          pnpm -r exec -- npm version "${CANARY_VERSION}" --no-git-tag-version
      - run: pnpm -r publish --access public --tag canary --no-git-checks --provenance

  stable:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm changeset publish
